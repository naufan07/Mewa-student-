<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewa Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <header class="bg-[#0047AB] text-white p-6 shadow-md">
        <h1 class="text-2xl font-bold">Mewa Student</h1>
        <p class="text-sm opacity-90">Student: Mohammed Naufan</p>
    </header>

    <main class="p-4 space-y-6">
        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-[#0047AB] font-bold mb-4 border-b pb-2 text-lg">Attendance & Faculty</h2>
            <div class="space-y-4 text-sm">
                <div>
                    <div class="flex justify-between font-medium"><span>Adv. Financial Accounting</span><span>88%</span></div>
                    <p class="text-xs text-gray-500 italic">Prof. Sumana (HOD)</p>
                </div>
                <div>
                    <div class="flex justify-between font-medium"><span>Human Resource Mgmt.</span><span>92%</span></div>
                    <p class="text-xs text-gray-500 italic">Prof. Seema</p>
                </div>
                <div>
                    <div class="flex justify-between font-medium"><span>Business Regulation</span><span>79%</span></div>
                    <p class="text-xs text-gray-500 italic">Prof. Chinmay</p>
                </div>
            </div>
        </section>

        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-[#0047AB] font-bold mb-4 border-b pb-2 text-lg">Karnataka Holidays</h2>
            <ul class="text-sm space-y-2">
                <li class="flex justify-between"><span>Dr. Ambedkar Jayanti</span><span class="font-bold">April 14</span></li>
                <li class="flex justify-between"><span>May Day</span><span class="font-bold">May 1</span></li>
                <li class="flex justify-between"><span>Kannada Rajyotsava</span><span class="font-bold">Nov 1</span></li>
            </ul>
        </section>
    </main>
</body>
</html>
